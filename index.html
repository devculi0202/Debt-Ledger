<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Ledger - Secure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        light: {
                            bg: '#F8FAFC',
                            surface: '#FFFFFF',
                            textPrimary: '#0F172A',
                            textSecondary: '#64748B',
                            border: '#E2E8F0',
                        },
                        dark: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            textPrimary: '#F8FAFC',
                            textSecondary: '#94A3B8',
                            border: '#334155',
                        },
                        brand: {
                            primary: '#2563EB',
                            negative: '#EF4444',
                            positive: '#10B981',
                            warning: '#F59E0B',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .transition-all-custom {
            transition-property: background-color, border-color, color, fill, stroke, opacity;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }
    </style>
</head>
<body class="bg-light-bg dark:bg-dark-bg text-light-textPrimary dark:text-dark-textPrimary min-h-screen transition-all-custom">

    <!-- ========================================== -->
    <!-- AUTHENTICATION PAGE (Visible when logged out)-->
    <!-- ========================================== -->
    <div id="loginContainer" class="hidden min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-light-surface dark:bg-dark-surface p-8 md:p-12 rounded-2xl shadow-xl border border-light-border dark:border-dark-border max-w-md w-full text-center space-y-6">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-primary/10 dark:bg-brand-primary/20 mb-2">
                <i class="fa-solid fa-scale-balanced text-3xl text-brand-primary"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-light-textPrimary dark:text-dark-textPrimary">Welcome Back</h1>
                <p class="text-light-textSecondary dark:text-dark-textSecondary mt-2 text-sm">Sign in to manage your financial ledgers.</p>
            </div>
            
            <button onclick="signInWithGithub()" class="w-full flex items-center justify-center gap-3 bg-dark-bg hover:opacity-90 dark:bg-light-surface dark:hover:opacity-90 text-light-surface dark:text-dark-bg font-semibold py-3 px-4 rounded-xl transition shadow-md">
                <i class="fa-brands fa-github text-xl"></i>
                Continue with GitHub
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MAIN APPLICATION (Visible when logged in)  -->
    <!-- ========================================== -->
    <div id="appContainer" class="hidden p-4 md:p-8">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-center bg-light-surface dark:bg-dark-surface p-5 rounded-xl shadow-sm border border-light-border dark:border-dark-border gap-4">
                <h1 class="text-2xl font-bold text-light-textPrimary dark:text-dark-textPrimary">
                    <i class="fa-solid fa-scale-balanced text-brand-primary mr-2"></i>Debt Ledger
                </h1>
                <div class="flex items-center space-x-3">
                    <div id="userInfo" class="text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mr-2 hidden sm:block"></div>
                    
                    <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center bg-light-bg dark:bg-dark-bg hover:bg-light-border dark:hover:bg-dark-border text-light-textSecondary dark:text-dark-textSecondary rounded-full transition shadow-sm border border-light-border dark:border-dark-border" title="Toggle Dark Mode">
                        <i id="themeIcon" class="fa-solid fa-moon"></i>
                    </button>
                    
                    <button onclick="signOut()" class="px-4 py-2 bg-brand-negative/10 hover:bg-brand-negative/20 text-brand-negative text-sm font-medium rounded-lg transition shadow-sm border border-brand-negative/20">
                        <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Sign Out
                    </button>
                </div>
            </div>

            <!-- Summary KPI Dashboard -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-light-surface dark:bg-dark-surface p-6 rounded-xl shadow-sm border border-light-border dark:border-dark-border">
                    <p class="text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Net Position <span class="period-label font-normal text-xs ml-1"></span></p>
                    <h2 id="netBalance" class="text-3xl font-bold dark:text-dark-textPrimary">0 ?</h2>
                </div>
                <div class="bg-light-surface dark:bg-dark-surface p-6 rounded-xl shadow-sm border border-light-border dark:border-dark-border border-b-4 border-b-brand-positive">
                    <p class="text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Receivables <span class="period-label font-normal text-xs ml-1"></span></p>
                    <h2 id="totalReceivables" class="text-3xl font-bold text-brand-positive">0 ?</h2>
                </div>
                <div class="bg-light-surface dark:bg-dark-surface p-6 rounded-xl shadow-sm border border-light-border dark:border-dark-border border-b-4 border-b-brand-negative">
                    <p class="text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Liabilities <span class="period-label font-normal text-xs ml-1"></span></p>
                    <h2 id="totalLiabilities" class="text-3xl font-bold text-brand-negative">0 ?</h2>
                </div>
            </div>

            <!-- Main Layout Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Log / Edit Form -->
                <div class="lg:col-span-1 bg-light-surface dark:bg-dark-surface p-6 rounded-xl shadow-sm border border-light-border dark:border-dark-border h-fit" id="formContainer">
                    <h3 id="formTitle" class="text-lg font-semibold mb-4 border-b border-light-border dark:border-dark-border pb-2 text-light-textPrimary dark:text-dark-textPrimary">Log Transaction</h3>
                    <form id="debtForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Type</label>
                            <select id="type" class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 outline-none focus:border-brand-primary dark:focus:border-brand-primary">
                                <option value="owed">Owed to Me (+)</option>
                                <option value="owe">I Owe (-)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Entity</label>
                            <input type="text" id="person" required class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 outline-none focus:border-brand-primary dark:focus:border-brand-primary placeholder:text-light-textSecondary/50 dark:placeholder:text-dark-textSecondary/50" placeholder="e.g., Alice">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Amount (VN?)</label>
                            <div class="relative">
                                <input type="number" id="amount" required min="0" step="1" class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 pr-8 outline-none focus:border-brand-primary dark:focus:border-brand-primary placeholder:text-light-textSecondary/50 dark:placeholder:text-dark-textSecondary/50" placeholder="100000">
                                <span class="absolute right-3 top-2.5 text-light-textSecondary dark:text-dark-textSecondary font-medium">?</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Tx Date</label>
                                <input type="date" id="txDate" required class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 outline-none focus:border-brand-primary dark:focus:border-brand-primary text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Due Date</label>
                                <input type="date" id="dueDate" class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 outline-none focus:border-brand-primary dark:focus:border-brand-primary text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-light-textSecondary dark:text-dark-textSecondary mb-1">Notes</label>
                            <input type="text" id="notes" class="w-full border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2.5 outline-none focus:border-brand-primary dark:focus:border-brand-primary placeholder:text-light-textSecondary/50 dark:placeholder:text-dark-textSecondary/50" placeholder="Optional">
                        </div>
                        
                        <div class="flex gap-2 mt-2">
                            <button type="submit" id="submitBtn" class="flex-1 bg-brand-primary hover:opacity-90 text-white font-semibold py-2.5 rounded-lg transition shadow-sm">
                                Add Record
                            </button>
                            <button type="button" id="cancelBtn" onclick="cancelEdit()" class="hidden flex-1 bg-light-border dark:bg-dark-border hover:opacity-80 text-light-textPrimary dark:text-dark-textPrimary font-semibold py-2.5 rounded-lg transition shadow-sm">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Ledger View -->
                <div class="lg:col-span-2 bg-light-surface dark:bg-dark-surface p-6 rounded-xl shadow-sm border border-light-border dark:border-dark-border">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-light-border dark:border-dark-border pb-4 mb-4 gap-4">
                        <h3 class="text-lg font-semibold text-light-textPrimary dark:text-dark-textPrimary">Ledger View</h3>
                        <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                            <select id="monthFilter" onchange="render()" class="border border-light-border dark:border-dark-border bg-light-bg dark:bg-dark-bg text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2 text-xs outline-none font-medium focus:border-brand-primary">
                                <option value="all">All Time</option>
                            </select>
                            <select id="statusFilter" onchange="render()" class="border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2 text-xs outline-none focus:border-brand-primary">
                                <option value="all">All Statuses</option>
                                <option value="active">Active Only</option>
                                <option value="settled">Settled Only</option>
                            </select>
                            <div class="relative flex-1 sm:flex-initial">
                                <span class="absolute left-3 top-2.5 text-light-textSecondary dark:text-dark-textSecondary text-sm"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" id="searchInput" oninput="render()" class="w-full sm:w-36 border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface text-light-textPrimary dark:text-dark-textPrimary rounded-lg p-2 pl-9 text-xs outline-none focus:border-brand-primary placeholder:text-light-textSecondary/50 dark:placeholder:text-dark-textSecondary/50" placeholder="Search...">
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[500px]">
                            <thead>
                                <tr class="bg-light-bg dark:bg-dark-bg text-light-textSecondary dark:text-dark-textSecondary text-xs uppercase tracking-wider border-y border-light-border dark:border-dark-border">
                                    <th class="p-3 font-semibold">Status / Date</th>
                                    <th class="p-3 font-semibold">Entity</th>
                                    <th class="p-3 font-semibold">Details</th>
                                    <th class="p-3 font-semibold text-right">Amount (VN?)</th>
                                    <th class="p-3 font-semibold text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ledgerBody" class="divide-y divide-light-border dark:divide-dark-border text-sm hidden">
                                <!-- Injected dynamically -->
                            </tbody>
                        </table>
                        
                        <div id="loadingState" class="flex flex-col items-center justify-center py-16 text-light-textSecondary dark:text-dark-textSecondary">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-primary"></i>
                            <p class="font-medium">Syncing database...</p>
                        </div>

                        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-light-textSecondary dark:text-dark-textSecondary">
                            <i class="fa-solid fa-folder-open text-5xl mb-4 opacity-50"></i>
                            <p class="font-semibold">No records found</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Engine -->
    <script>
        // ==========================================
        // 1. SUPABASE CONFIGURATION
        // ==========================================
        const SUPABASE_URL = 'https://fceifsdytukqhesnkyyq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nsMMasjawPFo_fe9hGgjWQ_3lP0DxA7';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // App State & UI Logic
        // ==========================================
        let debts = [];
        let editingId = null;
        let currentUser = null;
        
        document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
        const formatVND = (amount) => amount.toLocaleString('vi-VN', { style: 'currency', currency: 'VND' });

        // Dark Mode Logic
        const html = document.documentElement;
        const themeIcon = document.getElementById('themeIcon');
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }
        function toggleDarkMode() {
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // ==========================================
        // AUTHENTICATION LOGIC
        // ==========================================
        supabaseClient.auth.onAuthStateChange((event, session) => {
            const loginContainer = document.getElementById('loginContainer');
            const appContainer = document.getElementById('appContainer');
            const userInfo = document.getElementById('userInfo');

            if (session) {
                currentUser = session.user;
                loginContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
                
                const githubName = session.user.user_metadata?.user_name || session.user.email;
                userInfo.textContent = `Hello, ${githubName}`;
                
                fetchDebts();
            } else {
                currentUser = null;
                loginContainer.classList.remove('hidden');
                appContainer.classList.add('hidden');
            }
        });

        async function signInWithGithub() {
            const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github' });
            if (error) alert(error.message);
        }

        async function signOut() {
            const { error } = await supabaseClient.auth.signOut();
            if (error) alert(error.message);
        }

        // ==========================================
        // Database Operations & Rendering
        // ==========================================
        async function fetchDebts() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('ledgerBody').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            const { data, error } = await supabaseClient
                .from('debts')
                .select('*')
                .order('created_at', { ascending: false });

            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('ledgerBody').classList.remove('hidden');

            if (error) {
                console.error('Error fetching data:', error);
                alert("Database connection failed.");
                return;
            }

            debts = data || [];
            populateMonthDropdown();
            render();
        }

        function populateMonthDropdown() {
            const monthFilter = document.getElementById('monthFilter');
            const currentVal = monthFilter.value;
            const months = new Set();
            
            debts.forEach(d => {
                const dateStr = d.transaction_date || d.created_at.split('T')[0];
                months.add(dateStr.substring(0, 7));
            });
            
            const sortedMonths = Array.from(months).sort().reverse();
            monthFilter.innerHTML = '<option value="all">All Time</option>';
            
            sortedMonths.forEach(m => {
                const [year, month] = m.split('-');
                const dateObj = new Date(year, month - 1);
                monthFilter.innerHTML += `<option value="${m}">${dateObj.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })} ${year}</option>`;
            });
            
            if (sortedMonths.includes(currentVal)) monthFilter.value = currentVal;
        }

        function render() {
            const ledgerBody = document.getElementById('ledgerBody');
            const emptyState = document.getElementById('emptyState');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('statusFilter').value;
            const filterMonth = document.getElementById('monthFilter').value;
            
            let totalReceivables = 0;
            let totalLiabilities = 0;

            ledgerBody.innerHTML = '';

            const filteredDebts = debts.filter(debt => {
                const tDateStr = debt.transaction_date || debt.created_at.split('T')[0];
                const dMonth = tDateStr.substring(0, 7);
                
                const matchesMonth = filterMonth === 'all' || dMonth === filterMonth;
                const matchesSearch = debt.person.toLowerCase().includes(searchQuery) || (debt.notes && debt.notes.toLowerCase().includes(searchQuery));
                const matchesStatus = filterStatus === 'all' || 
                                     (filterStatus === 'active' && !debt.paid) || 
                                     (filterStatus === 'settled' && debt.paid);
                
                return matchesMonth && matchesSearch && matchesStatus;
            });

            if (filteredDebts.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            filteredDebts.forEach(debt => {
                if (!debt.paid) {
                    if (debt.type === 'owed') totalReceivables += Number(debt.amount);
                    if (debt.type === 'owe') totalLiabilities += Number(debt.amount);
                }

                const tr = document.createElement('tr');
                const isEditing = editingId === debt.id;
                
                tr.className = `transition group 
                    ${debt.paid ? 'bg-light-bg/50 dark:bg-dark-bg/50' : 'hover:bg-light-bg dark:hover:bg-dark-bg'} 
                    ${isEditing ? 'bg-brand-primary/5 dark:bg-brand-primary/10 outline outline-1 outline-brand-primary/30' : ''}`;
                
                const badgeColor = debt.paid 
                    ? 'bg-light-bg dark:bg-dark-bg text-light-textSecondary dark:text-dark-textSecondary border border-light-border dark:border-dark-border' 
                    : (debt.type === 'owed' ? 'bg-brand-positive/10 text-brand-positive border border-brand-positive/30' : 'bg-brand-negative/10 text-brand-negative border border-brand-negative/30');
                
                const statusLabel = debt.paid ? 'Settled' : (debt.type === 'owed' ? 'Owed to Me' : 'I Owe');
                
                const amountColor = debt.paid 
                    ? 'text-light-textSecondary dark:text-dark-textSecondary line-through opacity-70' 
                    : (debt.type === 'owed' ? 'text-brand-positive' : 'text-brand-negative');
                    
                const displayDate = debt.transaction_date || debt.created_at.split('T')[0];
                const amountDisplay = (debt.type === 'owe' && !debt.paid ? '-' : (debt.type === 'owed' && !debt.paid ? '+' : '')) + formatVND(Number(debt.amount));

                tr.innerHTML = `
                    <td class="p-3">
                        <div class="flex flex-col items-start gap-1">
                            <span class="px-2.5 py-0.5 text-[10px] font-medium uppercase tracking-wide rounded-full ${badgeColor}">${statusLabel}</span>
                            <span class="text-xs text-light-textSecondary dark:text-dark-textSecondary font-medium">${displayDate}</span>
                        </div>
                    </td>
                    <td class="p-3 font-semibold text-light-textPrimary dark:text-dark-textPrimary ${debt.paid ? 'text-light-textSecondary dark:text-dark-textSecondary line-through opacity-70' : ''}">
                        ${escapeHTML(debt.person)}
                    </td>
                    <td class="p-3 text-light-textSecondary dark:text-dark-textSecondary">
                        <div class="truncate max-w-[180px] text-xs font-medium">${escapeHTML(debt.notes || '-')}</div>
                        ${debt.due_date ? `<div class="text-[10px] text-brand-warning mt-1 font-semibold uppercase tracking-wider">Due: ${debt.due_date}</div>` : ''}
                    </td>
                    <td class="p-3 font-bold text-right text-sm ${amountColor}">${amountDisplay}</td>
                    <td class="p-3 text-center space-x-2 whitespace-nowrap">
                        <button onclick="togglePaid('${debt.id}')" class="text-light-textSecondary dark:text-dark-textSecondary hover:text-brand-positive transition" title="Toggle Status">
                            <i class="fa-solid ${debt.paid ? 'fa-rotate-left' : 'fa-circle-check'}"></i>
                        </button>
                        <button onclick="editDebt('${debt.id}')" class="text-light-textSecondary dark:text-dark-textSecondary hover:text-brand-primary transition" title="Edit Record">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="deleteDebt('${debt.id}')" class="text-light-textSecondary dark:text-dark-textSecondary hover:text-brand-negative transition" title="Delete">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                ledgerBody.appendChild(tr);
            });

            const net = totalReceivables - totalLiabilities;
            document.getElementById('totalReceivables').textContent = formatVND(totalReceivables);
            document.getElementById('totalLiabilities').textContent = formatVND(totalLiabilities);
            
            const netEl = document.getElementById('netBalance');
            netEl.textContent = formatVND(net);
            netEl.className = `text-3xl font-bold ${net > 0 ? 'text-brand-positive' : (net < 0 ? 'text-brand-negative' : 'text-light-textPrimary dark:text-dark-textPrimary')}`;

            const periodText = filterMonth === 'all' ? '(All Time)' : `(${document.getElementById('monthFilter').options[document.getElementById('monthFilter').selectedIndex].text})`;
            document.querySelectorAll('.period-label').forEach(el => el.textContent = periodText);
        }

        document.getElementById('debtForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

            const amt = parseInt(document.getElementById('amount').value);
            if(isNaN(amt) || amt < 0) return alert("Vui lňng nh?p s? ti?n h?p l?");

            const payload = {
                type: document.getElementById('type').value,
                person: document.getElementById('person').value.trim(),
                amount: amt,
                transaction_date: document.getElementById('txDate').value,
                due_date: document.getElementById('dueDate').value || null,
                notes: document.getElementById('notes').value.trim()
            };

            if (editingId) {
                payload.paid = debts.find(d => d.id === editingId).paid; 
                const { error } = await supabaseClient.from('debts').update(payload).eq('id', editingId);
                if (!error) cancelEdit();
            } else {
                payload.paid = false;
                const { error } = await supabaseClient.from('debts').insert([payload]);
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
            
            if(!editingId) {
                e.target.reset();
                document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            }
            
            await fetchDebts(); 
        });

        function editDebt(id) {
            const debt = debts.find(d => d.id === id);
            if (!debt) return;
            editingId = id;
            
            document.getElementById('type').value = debt.type;
            document.getElementById('person').value = debt.person;
            document.getElementById('amount').value = debt.amount;
            document.getElementById('txDate').value = debt.transaction_date;
            document.getElementById('dueDate').value = debt.due_date || '';
            document.getElementById('notes').value = debt.notes || '';
            
            document.getElementById('formTitle').textContent = 'Update Transaction';
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = 'Save Changes';
            
            document.getElementById('cancelBtn').classList.remove('hidden');
            
            document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth' });
            render(); 
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('debtForm').reset();
            document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            
            document.getElementById('formTitle').textContent = 'Log Transaction';
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = 'Add Record';
            
            document.getElementById('cancelBtn').classList.add('hidden');
            render(); 
        }

        async function togglePaid(id) {
            const debt = debts.find(d => d.id === id);
            if (debt) {
                const newStatus = !debt.paid;
                debt.paid = newStatus;
                render(); 

                const { error } = await supabaseClient.from('debts').update({ paid: newStatus }).eq('id', id);
                if (error) {
                    console.error('Failed to sync', error);
                    debt.paid = !newStatus; 
                    render();
                }
            }
        }

        async function deleteDebt(id) {
            if (confirm('Delete this record? Action cannot be undone.')) {
                if (editingId === id) cancelEdit(); 
                
                const backupDebts = [...debts];
                debts = debts.filter(d => d.id !== id);
                render();

                const { error } = await supabaseClient.from('debts').delete().eq('id', id);
                if (error) {
                    console.error('Failed to delete', error);
                    debts = backupDebts; 
                    render();
                } else {
                    populateMonthDropdown();
                }
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
